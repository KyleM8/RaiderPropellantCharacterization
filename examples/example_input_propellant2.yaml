pressUnits: "psig" #"psig" or kPa
thrustUnits: "lbf" #"lbf" or "N"

psmoothing: [-1, -1, -1, -1, -1, -1] #array for pressure smoothing values: set to -1 for no smoothing, and set to a value between 0 and 1 for smoothing (higher number -> more smoothing)
tsmoothing: [0.075, 0.075, 0.075, 0.075, 0.075, 0.075] #array for thrust smoothing values

geometryUnits: "in" #"in" or "mm"
geometry: [[3.05,0.5,1.8], [3.05,0.5,1.8]] #geometry information: starting with the forwardmost grain and ending with the aftmost grain, one array for each grain with the grain length, core diameter, and outer diameter in that order

throatUnits: "in" #"in" or "mm"
throatDiameter: [0.344, 0.327, 0.344, 0.327, 0.3195, 0.289] #array of throat diameters for each fire

massUnits: "lb" #"lb" or "kg"
mass: [0.7782, 0.7782, 0.7782, 0.7782, 0.7782, 0.7782] #array of mass values for each fire

densityUnits: "lb/in3" #"lb/in3" or "kg/m3"
density: [0.0556, 0.0556, 0.0556, 0.0556, 0.0556, 0.0556] #array of density values for each fire